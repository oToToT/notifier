<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
  </head>
  <body>
    <label>
      Type:
      <select id="type">
        <option value="twitch">Twitch</option>
        <option value="twitcasting">Twitcasting</option>
      </select>
    </label>
    <br>
    <label>
      Username:
      <input type="text" id="username">
    </label>
    <br>
    <button id="add">Add</button>
    <hr>
    <h2>List</h2>
    <div id="tracked">
      <span id="loading">Loading...</span>
      <ul id="tracked-list">
      </ul>
    </div>
    <script>
      window.addEventListener('load', async function(){
        document.getElementById('add').addEventListener('click', async function() {
          const type = document.getElementById('type').value;
          const username = document.getElementById('username').value;
          await fetch(`/${type}/subscribe?username=${encodeURIComponent(username)}`, {
            method: 'PUT',
          });
          location.reload();
        });

        for (let type of ['twitch', 'twitcasting']) {
          await fetch(`${type}/list`)
          .then(response => response.json())
          .then(data => {
            const trackedList = document.getElementById('tracked-list');
            data.forEach(username => {
              const removeLink = document.createElement('a');
              removeLink.href = '#';
              removeLink.textContent = 'Remove';
              removeLink.addEventListener('click', async function() {
                await fetch(`/${type}/unsubscribe?username=${username}`, {
                  method: 'DELETE',
                });
                location.reload();
              });

              const li = document.createElement('li');
              li.textContent = `${type}: ${username} (`;
              li.appendChild(removeLink);
              li.appendChild(document.createTextNode(')'));
              trackedList.appendChild(li);
            });
          })
          .catch(error => {
            console.error('Error fetching tracked list:', error);
          });
        }
        document.getElementById('loading').remove();
      });
    </script>
  </body>
</html>
